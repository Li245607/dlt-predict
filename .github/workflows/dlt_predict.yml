name: 大乐透预测

on:
  schedule:
    - cron: "0 14 * * 1,3,6"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  dlt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 恢复学习数据库
        uses: actions/cache@v4
        id: cache-learn
        with:
          path: dlt_learn.json
          key: dlt-learn-${{ github.run_id }}
          restore-keys: |
            dlt-learn-

      - name: 运行验证 + 预测
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python dlt_predict.py verify

      - name: 上传预测报告
        uses: actions/upload-artifact@v4
        with:
          name: 预测报告-${{ github.run_id }}
          path: 大乐透预测_*.md
          retention-days: 90
