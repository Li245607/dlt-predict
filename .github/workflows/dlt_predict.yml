name: 大乐透预测

on:
  schedule:
    - cron: "30 13 * * 1,3,6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dlt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 运行验证 + 预测
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python dlt_predict.py verify
      - name: 提交学习数据库
        run: |
          git config user.name "dlt-bot"
          git config user.email "bot@example.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add dlt_learn.json
          git diff --cached --quiet || git commit -m "update learn db [skip ci]"
          git pull --rebase origin main
          git push
      - name: 上传预测报告
        uses: actions/upload-artifact@v4
        with:
          name: 预测报告
          path: 大乐透预测_*.md
          retention-days: 90
